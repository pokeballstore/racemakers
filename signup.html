<form
  action="https://api.web3forms.com/submit"
  method="POST"
  class="signup-form"
>

  <!-- Web3Forms access key -->
  <input
    type="hidden"
    name="access_key"
    value="98e4fe18-87f1-4d96-8748-3ef54183e740"
  >

  <!-- Redirect after successful submission -->
  <input
    type="hidden"
    name="redirect"
    value="https://racemakers.se/success.html"
  >

  <!-- Optional email subject -->
  <input
    type="hidden"
    name="subject"
    value="New Racemakers Signup"
  >

  <!-- Anti-spam -->
  <input
    type="checkbox"
    name="botcheck"
    class="hidden"
    style="display: none;"
  >

  <!-- NAME -->
  <div class="form-field">

    <label for="name">
      Name:
    </label><br>

    <input
      type="text"
      id="name"
      name="name"
      required
    >

  </div>

  <!-- EMAIL -->
  <div class="form-field">

    <label for="email">
      Email:
    </label><br>

    <input
      type="email"
      id="email"
      name="email"
      required
    >

  </div>

  <!-- MESSAGE -->
  <div class="form-field">

    <label for="message">
      Message:
    </label><br>

    <textarea
      id="message"
      name="message"
      rows="6"
    ></textarea>

  </div>

  <!-- PUBLIC PARTICIPANT NAME -->
  <div class="form-field">

    <label for="public-name">
      Public participant name:
    </label><br>

    <input
      type="text"
      id="public-name"
      name="public-name"
      placeholder="Real name or nickname"
      required
    >

    <small>
      This name may be shown publicly on the participants page.
    </small>

  </div>

  <!-- GDPR -->
  <div class="form-field">

    <label>

      <input
        type="checkbox"
        name="gdpr-consent"
        required
      >

      I agree that Racemakers may store my submitted information
      to manage the event registration.

    </label>

  </div>

  <!-- SUBMIT BUTTON -->
  <div class="form-actions">

    <button type="submit">
      Submit
    </button>

  </div>

</form>
